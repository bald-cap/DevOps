# =============================================================================
# DOCKER COMPOSE - Stack ACME API REST
# =============================================================================
# Cette stack comprend 3 services qui communiquent via un réseau Docker interne
# =============================================================================

version: '3.8'  # Version du format docker-compose

services:
  # ===========================================================================
  # SERVICE 1 : BASE DE DONNÉES MARIADB
  # ===========================================================================
  mariadb:
    image: mariadb:10.11                    # Image officielle MariaDB
    container_name: acme-mariadb            # Nom du conteneur
    restart: unless-stopped                 # Redémarrage auto sauf arrêt manuel
    
    # Variables d'environnement pour configurer MariaDB
    environment:
      MYSQL_ROOT_PASSWORD: root_secret      # Mot de passe root (à changer en prod)
      MYSQL_DATABASE: acme_db               # Base de données créée au démarrage
      MYSQL_USER: acme_user                 # Utilisateur applicatif
      MYSQL_PASSWORD: acme_password         # Mot de passe utilisateur
    
    # Volumes pour la persistance des données
    volumes:
      # Volume nommé : les données survivent aux redémarrages/suppressions du conteneur
      - mariadb_data:/var/lib/mysql
      # Le script SQL est exécuté automatiquement au 1er démarrage
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    
    # Réseau interne Docker pour la communication inter-conteneurs
    networks:
      - acme-network
    
    # Port exposé (optionnel, pour accès externe à la BDD)
    ports:
      - "3306:3306"

  # ===========================================================================
  # SERVICE 2 : API REST NODE.JS
  # ===========================================================================
  api:
    build:
      context: ./api                        # Dossier contenant le Dockerfile
      dockerfile: Dockerfile                # Nom du Dockerfile à utiliser
    container_name: acme-api                # Nom du conteneur
    restart: unless-stopped
    
    # Variables d'environnement pour la connexion à MariaDB
    # L'API utilise le nom du service 'mariadb' comme hostname
    environment:
      DB_HOST: mariadb                      # Hostname = nom du service Docker
      DB_USER: acme_user
      DB_PASSWORD: acme_password
      DB_NAME: acme_db
    
    # Port exposé : accès à l'API depuis l'hôte
    ports:
      - "3000:3000"                          # Port hôte:port conteneur
    
    # Dépendance : l'API attend que MariaDB soit démarré
    depends_on:
      - mariadb
    
    networks:
      - acme-network

  # ===========================================================================
  # SERVICE 3 : PHPMYADMIN - Interface web de gestion BDD
  # ===========================================================================
  phpmyadmin:
    image: phpmyadmin:latest                # Image officielle phpMyAdmin
    container_name: acme-phpmyadmin         # Nom du conteneur
    restart: unless-stopped
    
    # Configuration de la connexion à MariaDB
    environment:
      PMA_HOST: mariadb                     # Serveur de BDD (nom du service)
      PMA_PORT: 3306                        # Port MariaDB
      PMA_USER: acme_user                   # Utilisateur par défaut
      PMA_PASSWORD: acme_password           # Mot de passe par défaut
    
    # Port exposé : accès web à phpMyAdmin
    ports:
      - "8080:80"                            # Accessible sur http://localhost:8080
    
    depends_on:
      - mariadb
    
    networks:
      - acme-network

# =============================================================================
# RÉSEAUX
# =============================================================================
# Réseau bridge personnalisé permettant aux conteneurs de communiquer
# entre eux en utilisant leurs noms de service comme hostnames
networks:
  acme-network:
    driver: bridge                          # Driver réseau par défaut

# =============================================================================
# VOLUMES
# =============================================================================
# Volume nommé pour la persistance des données MariaDB
# Les données sont stockées dans /var/lib/docker/volumes/ sur l'hôte
volumes:
  mariadb_data:
    driver: local                           # Stockage local sur l'hôte
