apiVersion: apps/v1 # PHPMyAdmin Deployment
kind: Deployment
metadata:
  name: phpmyadmin-deployment
  labels:
    app: db-interface
spec:
  replicas: 2
  selector:
    matchLabels:
      app: db-interface
  template:
    metadata:
      labels:
        app: db-interface
    spec:
      containers:
        - name: phpmyadmin
          image: phpmyadmin/phpmyadmin:5.2.1
          ports:
            - containerPort: 80
          env:
            - name: PMA_HOST
              value: mariadb-service  # No IP Needed, references the DB Service
            - name: PMA_PORT
              value: "3306"
            - name: PMA_USER
              valueFrom:
                secretKeyRef:
                  name: db-user-env-variables
                  key: DB_USER
            - name: PMA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-user-env-variables
                  key: DB_PASSWORD
---
apiVersion: v1  # PHPMyAdmin Service
kind: Service
metadata:
  name: pma-service
spec:
  type: NodePort
  selector:
    app: db-interface
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80  # Will retrieve nodePort Dynamically
